name: Build & Deploy Jekyll to Cloudflare Pages

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
  schedule:
    # Run every 15 minutes to keep Google Calendar events in sync
    # This ensures newly added calendar events appear on the site without manual rebuilds
    - cron: '*/15 * * * *'

permissions:
  contents: read

concurrency:
  group: "pages-${{ github.event.pull_request.number || github.ref }}"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Figure out where Jekyll's "source" directory is (defaults to ".")
      - name: Determine Jekyll source dir
        id: jsrc
        run: |
          SRC=$(ruby -ryaml -e 'c=YAML.load_file("_config.yml"); puts(c["source"] || ".")')
          echo "JEKYLL_SRC=$SRC" >> "$GITHUB_ENV"

      # Write the calendar key into the Jekyll source directory
      - name: Write gcalendar-key.json
        shell: bash
        run: |
          mkdir -p "$JEKYLL_SRC"
          # preserve newlines/quotes exactly
          cat > "$JEKYLL_SRC/gcalendar-key.json" <<'JSON'
          ${{ secrets.GCALENDAR_KEY_JSON }}
          JSON

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: '3.4.5'

      - name: Install dependencies
        run: bundle install --without development

      - name: Build site
        run: bundle exec jekyll build --trace

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Optimize built images
        run: bash script/optimize-images.sh _site/assets/images

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=pack57paloalto
